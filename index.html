<!DOCTYPE html>
<html lang="en">

<head>
    <title>Title</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel = "stylesheet" href = "groupProject.css">
</head>

<body>

<!-- This holds the header information -->
<div class="Title">
    <div class="row">
        <h1>Task Manager App</h1>
    </div>
</div>

<!-- This holds the main information -->
<div class = "main">

    <div class="row">
        <div class="col-12 col-md-1 col-lg-3" style="padding: 5px;">
            <h1> New Tasks </h1>
        </div>
        <div class="col-12 col-md-11 col-lg" style="padding: 5px;">
            <h1> 
                Tasks 
                <span>
                    <!-- This holds the Search Bar -->
                    <input type="text" id="search_bar" placeholder="Enter For Search" style="width: 55dvw; padding: 5px; margin-left: 20px; font-size: 16px;">
                </span>
            </h1>
        </div>
        <div class="col-12 col-md-11 col-lg-1" style="width: 6dvw;">
            <!-- This holds the Filter information -->
            <img src="filter.png" alt="Filter Button" id="filter" style="width: 50px; height: 50px; padding-top: 5px;">
        </div>

    </div>

    <div class ="row" style="height: 75vh;">
        <!-- This holds the newTask information -->
        <div class = "col-12 col-md-1 col-lg-3">
            <div class="newTask">
                <form id="taskForm">
                    <input type="text" id="taskTitle" placeholder="Task Title" required />
                    <textarea id="taskDescription" placeholder="Task Description" required></textarea>
                    <input type="date" id="taskDueDate" required />
                    <button type="submit">Add Task</button>
                </form>
            </div>
        </div>

        <!-- This holds cards "task" -->
        <div class="col-12 col-md-11 col-lg" style="height: 75dvh; overflow-y: auto;">
            <div class ="cardStorage">
                <div class = "content" id = "content1">
                    <p style="display: block;">High priority</p>
                    <div class="task-container" id="highPriorityContainer" style="display: flex; flex-wrap: wrap;"></div>
                </div>
                <div class = "content" id = "content2">
                    <p style="display: block;">Medium priority</p>
                    <div class="task-container" id="mediumPriorityContainer" style="display: flex; flex-wrap: wrap;"></div>
                </div>
                <div class = "content" id = "content3">
                    <p style="display: block;">Low priority</p>
                    <div class="task-container" id="lowPriorityContainer" style="display: flex; flex-wrap: wrap;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- This holds the main information -->
<div class ="footer">
    <div class="row-lg">
        <p> © </p>
    </div>
</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="groupProject.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
